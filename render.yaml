services:
  - type: web
    name: feedback-app
    env: python
    rootDir: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    postDeployCommand: flask --app app:create_app db upgrade --directory admin/migrations
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: feedback-db
          property: connectionString

databases:
  - name: feedback-db
    plan: free
